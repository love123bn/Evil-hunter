<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ Dark Realm Tycoon</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <!-- Top Resource Bar -->
    <div id="top-bar" class="top-bar"></div>

    <!-- Navigation -->
    <div id="nav-bar" class="nav-bar"></div>

    <!-- Event Banner (overlays when event is active) -->
    <div id="event-banner" class="event-banner"></div>

    <!-- Main Content Area -->
    <div id="content" class="content"></div>

    <!-- Footer -->
    <div class="footer">
      <span>⚔️ Dark Realm Tycoon v1.0</span>
      <span>Auto-saving...</span>
    </div>
  </div>

  <!-- Scripts (order matters: data first, then engine, then UI) -->
  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
  <script src="js/hunters.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/crafting.js"></script>
  <script src="js/events.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // Boot the game when DOM is ready
    document.addEventListener('DOMContentLoaded', initGame);
  </script>
</body>
</html>
